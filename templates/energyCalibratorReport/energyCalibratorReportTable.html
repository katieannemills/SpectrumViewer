<template id='energyCalibratorDetectorReportTable'>
    <tr>
        <td class='col-md-2'>Literature Energy (keV)</td>
        <td class='col-md-2'>Centroid (Channel)</td>
        <td class='col-md-2'>Centroid (Energy, keV)</td>
        <td class='col-md-2'>Residual</td>
    </tr>
    {{# peaks}}
        <tr id='{{id}}{{.}}row'>
            <td id='{{id}}{{.}}literatureEnergy'>{{.}}</td>
            <td id='{{id}}{{.}}pulseHeightCentroid'>-</td>
            <td id='{{id}}{{.}}energyCentroid'>-</td>
            <td id='{{id}}{{.}}residual'>-</td>
        </tr>
    {{/ peaks}}
</template>

<template id='energyCalibratorCoefficientsReportTable'>
    <tr>
        <td class='col-md-2'>Detector</td>
        <td class='col-md-2'>Offset</td>
        <td class='col-md-2'>Gain</td>
        <td class='col-md-2'>Quad</td>
        <td class='col-md-2'>R^2</td>
        <td class='col-md-2'>Mean of |Residuals|</td>
    </tr>
    {{# detectors}}
        <tr id='{{id}}{{.}}row'>
            <td id='{{id}}{{.}}detector'>{{.}}</td>
            <td id='{{id}}{{.}}offset'>-</td>
            <td id='{{id}}{{.}}gain'>-</td>
            <td id='{{id}}{{.}}quad'>-</td>
            <td id='{{id}}{{.}}r2'>-</td>
            <td id='{{id}}{{.}}residual'>-</td>
        </tr>
    {{/ detectors}}
</template>
